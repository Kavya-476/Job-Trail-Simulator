server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy API requests directly if needed
    # location /api/ {
    #     proxy_pass http://backend:8001/;
    # }
}
